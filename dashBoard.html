<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Network Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .summary {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px 40px;
            text-align: center;
            border: 1px solid #333;
        }
        
        .summary-card h2 {
            font-size: 2.5rem;
        }
        
        .summary-card p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .total {
            color: #00d4ff;
        }
        
        .online {
            color: #00ff88;
        }
        
        .offline {
            color: #ff4444;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .host {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .badge-online {
            background: #00ff8820;
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        
        .badge-offline {
            background: #ff444420;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .card-info {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        
        .card-info span {
            color: #fff;
        }
        
        .timestamp {
            text-align: center;
            color: #555;
            margin-top: 30px;
            font-size: 0.85rem;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .refresh-btn:hover {
            background: #00b8d9;
        }
    </style>
</head>

<body>

    <h1>🌐 Network Monitor Dashboard</h1>
    <p class="subtitle">Built with Python + HTML | Cisco Ideathon Project</p>

    <div class="summary">
        <div class="summary-card">
            <h2 class="total" id="total">0</h2>
            <p>Total Hosts</p>
        </div>
        <div class="summary-card">
            <h2 class="online" id="onlineCount">0</h2>
            <p>Online</p>
        </div>
        <div class="summary-card">
            <h2 class="offline" id="offlineCount">0</h2>
            <p>Offline</p>
        </div>
    </div>

    <div class="grid" id="grid"></div>
    <button class="refresh-btn" onclick="render()">🔄 Refresh</button>
    <p class="timestamp" id="timestamp"></p>

    <script>
        // ✅ Update this array with your actual scan results
        const scanResults = [{
            host: "google.com",
            type: "Web Service",
            status: "OFFLINE"
        }, {
            host: "cisco.com",
            type: "Cisco Server",
            status: "OFFLINE"
        }, {
            host: "github.com",
            type: "Code Repository",
            status: "ONLINE"
        }, {
            host: "8.8.8.8",
            type: "Google DNS",
            status: "ONLINE"
        }, {
            host: "1.1.1.1",
            type: "Cloudflare DNS",
            status: "ONLINE"
        }];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            let onlineCount = 0;
            let offlineCount = 0;

            scanResults.forEach(item => {
                const isOnline = item.status === "ONLINE";
                if (isOnline) onlineCount++;
                else offlineCount++;

                grid.innerHTML += `
          <div class="card">
            <div class="card-header">
              <span class="host">${item.host}</span>
              <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">
                ${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'}
              </span>
            </div>
            <div class="card-info">
              Type: <span>${item.type}</span><br>
              Protocol: <span>ICMP Ping</span><br>
              Status: <span>${isOnline ? 'Reachable' : 'Unreachable'}</span>
            </div>
          </div>`;
            });

            document.getElementById('total').textContent = scanResults.length;
            document.getElementById('onlineCount').textContent = onlineCount;
            document.getElementById('offlineCount').textContent = offlineCount;
            document.getElementById('timestamp').textContent =
                '🕐 Last Updated: ' + new Date().toLocaleString();
        }

        render();
    </script>
</body>

</html>
