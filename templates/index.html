<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Network Monitor Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
        }
        
        .live-badge {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        
        .summary {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px 40px;
            text-align: center;
            border: 1px solid #333;
            transition: all 0.3s;
        }
        
        .summary-card h2 {
            font-size: 2.5rem;
        }
        
        .summary-card p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .total {
            color: #00d4ff;
        }
        
        .online {
            color: #00ff88;
        }
        
        .offline {
            color: #ff4444;
        }
        
        .scan-info {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .scan-info span {
            color: #00d4ff;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: transform 0.3s, border 0.3s;
        }
        
        .card:hover {
            transform: translateY(-4px);
        }
        
        .card.updated {
            border: 1px solid #00d4ff;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .host {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .badge-online {
            background: #00ff8820;
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        
        .badge-offline {
            background: #ff444420;
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .card-info {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.8;
        }
        
        .card-info span {
            color: #fff;
        }
        
        .timestamp {
            text-align: center;
            color: #555;
            margin-top: 30px;
            font-size: 0.8rem;
        }
        
        .connecting {
            text-align: center;
            color: #ffaa00;
            margin: 50px 0;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <h1>🌐 Network Monitor Dashboard</h1>
    <p class="subtitle">Built with Python + Flask + WebSocket | Cisco Ideathon Project</p>

    <div class="live-badge">
        <div class="dot"></div>
        <span style="color:#00ff88; font-size:0.85rem;">LIVE</span>
    </div>

    <div class="summary">
        <div class="summary-card">
            <h2 class="total" id="total">-</h2>
            <p>Total Hosts</p>
        </div>
        <div class="summary-card">
            <h2 class="online" id="onlineCount">-</h2>
            <p>Online</p>
        </div>
        <div class="summary-card">
            <h2 class="offline" id="offlineCount">-</h2>
            <p>Offline</p>
        </div>
    </div>

    <div class="scan-info">
        Scan: <span id="scanNum">Waiting...</span> | Last Updated: <span id="timestamp">Connecting...</span>
    </div>

    <div class="grid" id="grid">
        <div class="connecting">⏳ Connecting to monitor...</div>
    </div>

    <p class="timestamp">Auto-updates every 10 seconds via WebSocket</p>

    <script>
        const socket = io();

        socket.on('connect', () => {
            console.log('✅ Connected to server!');
        });

        socket.on('network_update', (data) => {
            // Update summary
            document.getElementById('total').textContent = data.results.length;
            document.getElementById('onlineCount').textContent = data.online;
            document.getElementById('offlineCount').textContent = data.offline;
            document.getElementById('scanNum').textContent = '#' + data.scan;
            document.getElementById('timestamp').textContent = data.timestamp;

            // Update cards
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            data.results.forEach(item => {
                const isOnline = item.status === "ONLINE";
                const card = document.createElement('div');
                card.className = 'card updated';
                card.innerHTML = `
          <div class="card-header">
            <span class="host">${item.host}</span>
            <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">
              ${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'}
            </span>
          </div>
          <div class="card-info">
            Type: <span>${item.type}</span><br>
            Protocol: <span>ICMP Ping</span><br>
            Status: <span>${isOnline ? 'Reachable' : 'Unreachable'}</span>
          </div>`;
                grid.appendChild(card);

                // Remove highlight after 2 seconds
                setTimeout(() => card.classList.remove('updated'), 2000);
            });
        });
    </script>
</body>

</html>
